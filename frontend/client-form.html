<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title> Cadastro de Cliente</title>
    <link rel="stylesheet" href="css/style.css">
</head>
 <body>
    <div class="container" style="max-width: 600px;">
        <h2> Cadastro de Cliente</h2>
        <p class="subtitle">  Insira as informações do cliente.</p>
        
          <form id="clientForm">
            <div class="form-grid">
                <div class="form-group">
                    <label>Código</label>
                    <input type="number" id="Id" disabled placeholder="Gerado automaticamente">
                </div>
                <div class="form-group">
                    <label>Documento CPF ou CNPJ</label>
                     <input type="text" id="Document" placeholder="000.000.000-00" required>
                </div>
            </div>

            <div class="form-group">
                <label>Nome </label>
                <input type="text" id="Name" maxlength="60" required placeholder="Máximo 60 caracteres">
             </div>

        <div class="form-group">
                <label> Nome Fantasia</label>
                <input type="text" id="TradeName" maxlength="100" placeholder="Máximo 100 caracteres" >
            </div>

              <div class="form-group">
                <label>Endereço </label>
                <input type="text" id="Address" placeholder="Rua, Número, Bairro, Cidade...">
            </div>

            <button type="submit" class="btn">Salvar Cliente </button>
            <button type="button" onclick="location.href='clients.html'" class="btn" style="background: #334155;">Cancelar </button>
        </form>
    </div>

    <script src="js/api.js"></script>
    <script src="js/clients.js"></script>

</body>
</html>
